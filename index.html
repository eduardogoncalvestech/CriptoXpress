<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriptoXpress | Segurança Simples</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="container">
        <header>
            <div class="logo">
                <h1>CriptoXpress</h1>
            </div>
            <p class="subtitle">Criptografia segura e instantânea.</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="texto">Mensagem</label>
                <textarea id="texto" placeholder="Digite seu texto secreto aqui..."></textarea>
            </div>

            <div class="input-group">
                <label for="chave">Chave de Segurança</label>
                <input type="password" id="chave" placeholder="Sua senha secreta">
            </div>

            <div class="actions">
                <button onclick="criptografar()" class="btn btn-primary">Criptografar</button>
                <button onclick="descriptografar()" class="btn btn-secondary">Descriptografar</button>
            </div>

            <div class="result-container">
                <label>Resultado</label>
                <div class="result-box">
                    <div id="resultado" class="result-text"></div>
                    <button onclick="copiarTexto()" class="btn-copy" title="Copiar resultado">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>Desenvolvido por <span class="dev-name">Eduardo Gonçalves Tech</span></p>
            <div class="social-links">
                <a href="https://www.instagram.com/eduardogoncalvestech/" target="_blank" rel="noopener">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    Instagram
                </a>
                <span class="separator">•</span>
                <a href="https://github.com/eduardogoncalvestech" target="_blank" rel="noopener">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    Github
                </a>
            </div>
        </footer>
    </main>

    <div id="toast">Criptografia copiada!</div>

    <script src="script.js"></script>
</body>
</html>
